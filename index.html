<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 16px;
      }

      .chat-box {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        height: 90vh;
        overflow: hidden;
      }

      .chat-header {
        background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        color: white;
        padding: 16px 20px;
        font-size: 18px;
        font-weight: bold;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message {
        padding: 10px 14px;
        border-radius: 10px;
        max-width: 80%;
        font-size: 14px;
        line-height: 1.5;
      }

      .message.user {
        background: #0f3460;
        color: white;
        align-self: flex-end;
      }

      .message.ai {
        background: #f1f3f4;
        color: #333;
        align-self: flex-start;
      }

      .message.error {
        background: #fce8e6;
        color: #c5221f;
        align-self: flex-start;
      }

      .chat-input {
        display: flex;
        gap: 8px;
        padding: 16px;
        border-top: 1px solid #eee;
      }

      .chat-input input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
      }

      .chat-input input:focus {
        border-color: #4285f4;
      }

      .chat-input button {
        background: #0f3460;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .chat-input button:hover {
        background: #1a4a7a;
      }
      .chat-input button:disabled {
        background: #aaa;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="chat-box">
      <div class="chat-header">
        Gemini Powered AI Chatbot <i class="fa-solid fa-star"> </i>
      </div>

      <div class="chat-messages" id="messages">
        <div class="message ai">
          Hi! I'm powered by Gemini. Ask me anything!
        </div>
      </div>

      <div class="chat-input">
        <input
          class="form-control rounded-pill"
          type="text"
          id="userInput"
          placeholder="Type your message..."
        />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      const API_KEY = "YOUR_API_KEY_HERE";

      const messagesDiv = document.getElementById("messages");
      const userInput = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");

      // Sends message when pressing Enter
      userInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") sendMessage();
      });

      function addMessage(text, role) {
        const div = document.createElement("div");
        div.className = "message " + role;
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Shows user message
        addMessage(text, "user");
        userInput.value = "";
        sendBtn.disabled = true;

        // Shows loading
        addMessage("Thinking...", "ai");

        try {
          // Calls Gemini API
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [{ text: text }] }],
              }),
            }
          );

          const data = await response.json();

          // Removes "Thinking..." message
          messagesDiv.lastChild.remove();

          if (data.candidates && data.candidates[0]) {
            const aiReply = data.candidates[0].content.parts[0].text;
            addMessage(aiReply, "ai");
          } else {
            addMessage("Error: " + JSON.stringify(data), "error");
          }
        } catch (err) {
          messagesDiv.lastChild.remove();
          addMessage("Network error: " + err.message, "error");
        }

        sendBtn.disabled = false;
        userInput.focus();
      }
    </script>
  </body>
</html>
